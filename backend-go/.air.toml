root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  delay = 1000
  exclude_dir = ["tmp", "data"]
  exclude_regex = ["_test.go"]
  include_ext = ["go", "toml"]
  kill_delay = "0s"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false
